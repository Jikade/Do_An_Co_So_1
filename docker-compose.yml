version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-emotion_music}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ml:
    build:
      context: ./emotion-music-player
      dockerfile: infra/Dockerfile.ml
    ports:
      - "8001:8001"

  api:
    build:
      context: ./emotion-music-player
      dockerfile: infra/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-emotion_music}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ML_SERVICE_URL: http://ml:8001
      REQUEST_TIMEOUT_SECONDS: 10
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./emotion-music-player/data/mp3:/data/mp3
      - ./emotion-music-player/data/images:/data/images
      - ./emotion-music-player/scripts:/scripts
    depends_on:
      - db
      - ml

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
